name: issue-triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Triage issue
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/big-pickle
          use_github_token: true
          prompt: |
            Eres el agente de triage del repositorio "03-opencode-asteroids", un clon de Asteroids en JavaScript vanilla (sin dependencias, sin bundler, sin build).

            Se acaba de abrir un issue. Tu tarea es clasificarlo y reformatear su cuerpo.

            PASO 1: Lee el issue con gh issue view ${{ github.event.issue.number }} --json number,title,body

            PASO 2: Clasifica el issue con 1-2 etiquetas de este conjunto:
            - bug: error, fallo o comportamiento incorrecto
            - enhancement: mejora o nueva funcionalidad
            - question: duda o pedido de ayuda
            - documentation: problema o mejora de la documentación
            - needs-triage: ambiguo o no clasificable

            PASO 3: Reformatea el body del issue con estas secciones exactas (en español):

            ## Resumen
            Resumen conciso del problema o solicitud (1-3 oraciones).

            ## Información relevante
            - Área probable del código (ej. game.js: clase Ship, función update). Si no aplica, "N/A".
            - Severidad sugerida: baja | media | alta.
            - Pasos de reproducción esperados, si aplica. Si no hay información suficiente, "Falta información para determinar pasos de reproducción."

            ## Descripción
            Versión reformateada y normalizada del contenido del usuario. Preserva los hechos, no inventes detalles, corrige el formato markdown (encabezados, listas, código).

            ---
            _Texto original del issue_
            > texto original del usuario citado línea por línea

            REGLAS IMPORTANTES:
            - No inventes detalles técnicos que no estén en el issue.
            - El body debe ser markdown válido.
            - No incluyas el título dentro del body.
            - Preserva el texto original exactamente, sin modificar ni traducir.

            PASO 4: Aplica los cambios con estos comandos:
            1. Escribe el body reformateado a un archivo temporal: echo "BODY_REFORMATEADO" > /tmp/body.md
            2. Ejecuta: gh issue edit ${{ github.event.issue.number }} --body-file /tmp/body.md --add-label "etiqueta1,etiqueta2"
            3. Si la etiqueta no existe, créala primero con: gh label create "nombre" --color "color" --force
               Colores: bug=d73a4a, enhancement=a2eeef, question=d876e3, documentation=0075ca, needs-triage=fbca04

            IMPORTANTE: Ejecuta los comandos de gh directamente. No solo muestres el resultado, aplícalo al issue.
